ational, Hisense Libya","description":"This brand introduction film was produced to present Al Rabee International, the official distributor of Hisense in Libya. The project was developed to introduce the company’s role in delivering international technology brands to the Libyan market. Through cinematic visuals and structured storytelling, the film highlights the company’s products, operations, and brand presence. The production approach focuses on clean commercial imagery and controlled visual pacing to present the company in a professional and modern light.","client":"Hisense Libya","year":null,"project_type":"Brand Film / Corporate Video","project_role":"Cinematographer, Editor","featured":false,"thumbnail":"https://img.youtube.com/vi/HDZqsYgUi9E/maxresdefault.jpg","media":{"type":"video","url":"https://youtu.be/HDZqsYgUi9E","poster":"https://img.youtube.com/vi/HDZqsYgUi9E/maxresdefault.jpg"},"gallery_images":[]},{"id":"derham-podcast-business-conversations","title":"Derham Podcast — Business Conversations","headline":"podcast exploring business, investment, and economic development in Libya","description":"Derham Podcast is a long-form discussion platform focused on business, entrepreneurship, and large-scale projects shaping the Libyan economy. The production was developed with a cinematic studio approach, where the visual environment, lighting design, and camera composition were carefully crafted to create a professional and visually engaging podcast format. As Director of Photography and Art Director for the set design and lighting setup, the work involved building the visual identity of the studio space and establishing a consistent cinematic style for the show. The podcast later gained significant recognition and was awarded Best Podcast in Libya in 2025","client":"Derham Podcast","year":"2024","project_type":"Podcast / Studio Production","project_role":"DOP ,  Art Director (Set & Lighting Design)","featured":true,"thumbnail":"https://img.youtube.com/vi/ro
